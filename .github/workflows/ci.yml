name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run build

      - run: npm run test:coverage -- --reporter=default --reporter=json --outputFile=coverage-report.json

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Coverage summary
        if: always()
        run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npx vitest run --coverage 2>&1 | grep -A 100 "% Coverage report" | head -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Generate coverage badge
        if: github.ref == 'refs/heads/main'
        run: |
          COVERAGE=$(npx vitest run --coverage 2>&1 | grep "All files" | awk '{print $4}')
          COVERAGE_INT=${COVERAGE%.*}
          if [ "$COVERAGE_INT" -ge 80 ]; then COLOR="brightgreen";
          elif [ "$COVERAGE_INT" -ge 70 ]; then COLOR="green";
          elif [ "$COVERAGE_INT" -ge 60 ]; then COLOR="yellowgreen";
          elif [ "$COVERAGE_INT" -ge 50 ]; then COLOR="yellow";
          else COLOR="red"; fi
          mkdir -p .github/badges
          curl -s "https://img.shields.io/badge/coverage-${COVERAGE}%25-${COLOR}" > .github/badges/coverage.svg

      - name: Commit badge
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .github/badges/coverage.svg
          git diff --staged --quiet || git commit -m "Update coverage badge [skip ci]" && git push
